                  - generic [ref=e129]:
                    - text: What to Expect
                    - generic [ref=e130]:
                      - paragraph [ref=e131]: Tesla is seeking exceptional Machine Learning Interns to help build large scale models to drive the future of autonomy across all current and future generations of Tesla AI products. You will work on a lean team without boundaries and have access to one of the world’s largest training clusters with a data engine that constantly generates new information for improving our models. Most importantly, you will see your work repeatedly shipped to and utilized by millions of Tesla’s customers.
                      - paragraph [ref=e132]: "We are seeking Interns in the following AI disciplines:"
                      - list [ref=e133]:
                        - listitem [ref=e134]: Train large-scale foundation and generative models that are optimized for performance and latency
                        - listitem [ref=e135]: Improve data engine for large scale and high-quality dataset curation
                        - listitem [ref=e136]: Reinforcement Learning for instilling objectives and improving overall robustness, including RL for training
                        - listitem [ref=e137]: Design compound AI systems for better planning and reasoning, with emphasis on world modeling and generative videos
                    - text: What You'll Do
                    - list [ref=e139]:
                      - listitem [ref=e140]: Applied research in the areas of Foundation Models, including but not limited to computer vision, large language models and generative modeling
                      - listitem [ref=e141]: Work on cutting-edge techniques in AI - multi-task learning, video networks, multi-modal generative models, imitation learning, reinforcement learning, semi-supervised learning, self-supervised learning
                      - listitem [ref=e142]: Explore and implement novel AI tooling and techniques for efficient training and fine-tuning of large-scale models, incorporating RL for training
                      - listitem [ref=e143]: Leverage millions of miles of driving data and interventions to build a robust and scalable end-to-end learning based self-driving system
                      - listitem [ref=e144]: Collaborate with a team to apply research findings to real-world challenges, ensuring high-quality system integration within existing platforms
                      - listitem [ref=e145]: Experiment with data generation and network driven data collection approaches to enhance the diversity and quality of training data, including generative videos
                      - listitem [ref=e146]: Ship production quality, safety-critical software to the entirety of Tesla’s vehicle fleet, with applications in world modeling
                    - text: What You'll Bring
                    - list [ref=e148]:
                      - listitem [ref=e149]: Demonstrated experience in machine learning frameworks and models such as PyTorch, TensorFlow, GPT, CNNs, and generative models
                      - listitem [ref=e150]: Strong experience with Python and software engineering best practices
                      - listitem [ref=e151]: Experience with one or more of imitation Learning, reinforcement learning (offline/off-policy), modern neural network architectures (e.g., GPT, diffusion, generative models), or related techniques, including RL for training
                      - listitem [ref=e152]: "An “under the hood” knowledge of deep learning: layer details, loss functions, optimization, etc."
                      - listitem [ref=e153]: Prior experience with sparse training techniques, neural network pruning, and generative modeling, with exposure to generative videos
                      - listitem [ref=e154]: Experience with training large models on distributed computing
                      - listitem [ref=e155]: Ability to work on complex problems and produce significant research and/or experience deploying production ML models at scale, particularly in world modeling
                      - listitem [ref=e156]: Proven track record of innovations and executions in deep learning, demonstrated with shipping products or first-author publications at leading AI conferences
                    - text: Compensation and Benefits
                    - generic [ref=e157]: Benefits
                    - generic [ref=e158]:
                      - paragraph [ref=e159]: "As a full-time Tesla Intern, you will be eligible for:"
                      - list [ref=e160]:
                        - listitem [ref=e161]: Medical plans > plan options with $0 payroll deduction
                        - listitem [ref=e162]: Family-building, fertility, adoption and surrogacy benefits
                        - listitem [ref=e163]: Dental (including orthodontic coverage) and vision plans. Both have an option with a $0 payroll contribution
                        - listitem [ref=e164]: Company Paid (Health Savings Account) HSA Contribution when enrolled in the High Deductible Medical Plan with HSA
                        - listitem [ref=e165]: Healthcare and Dependent Care Flexible Spending Accounts (FSA)
                        - listitem [ref=e166]: 401(k), Employee Stock Purchase Plans, and other financial benefits
                        - listitem [ref=e167]: Company Paid Basic Life, AD&D, and short-term disability insurance (90 day waiting period)
                        - listitem [ref=e168]: Employee Assistance Program
                        - listitem [ref=e169]: Sick and Vacation time (Flex time for salary positions), and Paid Holidays
                        - listitem [ref=e170]: Back-up childcare and parenting support resources
                        - listitem [ref=e171]: "Voluntary benefits to include: critical illness, hospital indemnity, accident insurance, theft & legal services, and pet insurance"
                        - listitem [ref=e172]: Commuter benefits
                        - listitem [ref=e173]: Employee discounts and perks program
                    - generic [ref=e174]: Expected Compensation
