                    - generic [ref=e135]:
                      - paragraph [ref=e136]:
                        - generic [ref=e137]: Who We Are
                      - paragraph [ref=e138]:
                        - generic [ref=e139]: KBR Mission Technical Solutions
                        - text: delivers full life cycle professional and technical solutions that improve operational readiness and drive innovation. Our solutions help ensure mission success on land, air, sea, space and cyberspace for the Department of Defense, Intelligence Community, NASA and other federal agencies. KBR’s areas of expertise include engineering, logistics, operations, science, program management, mission IT and cybersecurity. KBR strives to create a safer, more secure and sustainable world by bringing together the best and brightest to deliver technologies and solutions that help our customers accomplish their most critical missions and objectives.
                      - paragraph
                      - paragraph [ref=e140]:
                        - generic [ref=e141]: The Mission Ahead
                      - paragraph [ref=e142]: This role is with KBR’s Mission Tech Solutions (MTS). At KBR MTS, we don't just envision a world that's safer, more secure, and sustainable - we create it. Our legacy of delivering advanced full life cycle professional and technical solutions is matched only by our commitment to operational readiness and innovation. As stewards of critical missions for the Department of Defense, Intelligence Community, NASA, and other key federal entities, we excel in engineering, logistics, operations, science, program management, mission IT, and cybersecurity. United in our quest for excellence, KBR stands at the vanguard, ready to transform possibilities into impactful realities for a better tomorrow.
                      - paragraph
                      - paragraph [ref=e143]:
                        - generic [ref=e144]: Why Join KBR?
                      - list [ref=e145]:
                        - listitem [ref=e146]: Mentorship from experienced subject matter experts
                        - listitem [ref=e147]: Cutting edge projects, relevant to real world challenges
                        - listitem [ref=e148]: Work in a collaborative and dynamic team environment
                        - listitem [ref=e149]: Networking opportunities with other technologists and executives
                        - listitem [ref=e150]: Competitive pay and great company culture
                      - paragraph
                      - paragraph [ref=e151]:
                        - generic [ref=e152]: As a
                        - generic [ref=e153]: National Security Solutions –
                        - generic [ref=e154]: AI/ML Intern
                        - generic [ref=e155]: ":"
                      - paragraph
                      - list [ref=e156]:
                        - listitem [ref=e157]: Develop and refine machine learning models, experimenting with various architectures and optimization strategies.
                        - listitem [ref=e158]: Implement clean, modular, and well‑documented code to support data processing, model training, and evaluation workflows.
                        - listitem [ref=e159]: Collaborate with senior engineers and mentors to translate high‑level research goals into actionable technical tasks.
                        - listitem [ref=e160]: Perform hands‑on data preparation, including preprocessing, transformation, and quality checks across diverse datasets.
                        - listitem [ref=e161]: Design and run controlled experiments to compare algorithmic approaches and analyze performance results.
                        - listitem [ref=e162]: Investigate emerging AI/ML techniques and prototype solutions that can be integrated into existing development pipelines.
                        - listitem [ref=e163]: Debug, profile, and optimize code to improve model efficiency and overall system performance.
                        - listitem [ref=e164]: Create visualizations, metrics, and technical summaries to communicate findings and progress to the engineering team.
                        - listitem [ref=e165]: Work with geospatial datasets, including SAR and EO imagery, to support computer vision and ML experimentation.
                        - listitem [ref=e166]: Contribute to image-based data processing and analysis efforts that support downstream machine learning development.
                      - paragraph
                      - paragraph [ref=e167]: Selected interns for this paid opportunity will be provided with the opportunity to mentor with experienced professionals, gain experience and establish a name for themselves in this high demand career field.
                      - paragraph
                      - paragraph [ref=e168]: "Required Skillset:"
                      - list [ref=e169]:
                        - listitem [ref=e170]: Currently enrolled and pursuing a Bachelor's, Master’s, or PhD degree in Computer Science, Electrical Engineering, Computer Engineering, Physics, or Applied Math
                        - listitem [ref=e171]: Strong proficiency in Python and experience with core ML libraries such as NumPy, pandas, scikit‑learn, TensorFlow, or PyTorch.
                        - listitem [ref=e172]: Solid understanding of machine learning fundamentals, including model training, evaluation, and experimental design.
                        - listitem [ref=e173]: Ability to preprocess, transform, validate, and manage datasets for training and analysis workflows.
                        - listitem [ref=e174]: Skilled in writing clean, modular, well‑documented code and debugging or optimizing ML pipelines.
                        - listitem [ref=e175]: Strong work ethics and interpersonal skills
                        - listitem [ref=e176]: Strong analytical and problem-solving skills
                        - listitem [ref=e177]: Excellent written and verbal communication skills
                      - paragraph
                      - paragraph [ref=e178]: "Scheduled Weekly Hours: Average 40 hours per week, 10 weeks in duration during the period of Sumer 2026"
                      - paragraph
                      - paragraph [ref=e179]: "Requirement:"
                      - list [ref=e180]:
                        - listitem [ref=e181]: Must be a US Citizen
                        - listitem [ref=e182]: Must pass a Security Pre-Screen and have the ability to obtain a security clearance.
                      - paragraph
                      - paragraph [ref=e183]:
                        - text: Belong, Connect and Grow at KBR
                        - text: At KBR, we are passionate about our people and our Zero Harm culture. These inform all that we do and are at the heart of our commitment to, and ongoing journey toward being a People First company. That commitment is central to our team of team’s philosophy and fosters an environment where everyone can Belong, Connect and Grow. We Deliver – Together.
                      - paragraph
                      - paragraph [ref=e184]: KBR is an equal opportunity employer. All qualified applicants will receive consideration for employment without regard to race, color, religion, disability, sex, sexual orientation, gender identity or expression, age, national origin, veteran status, genetic information, union status and/or beliefs, or any other characteristic protected by federal, state, or local law.
